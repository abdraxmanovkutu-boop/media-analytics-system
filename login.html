<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход | Media Analytics System</title>
  <link rel="stylesheet" href="css/diplim.css" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <h1>Media Analytics System</h1>
      <p class="subtitle">
        Информационная система анализа пользовательской активности на медиаплатформе
      </p>

      <form id="loginForm" class="login-form">
        <label for="username">Логин</label>
        <input type="text" id="username" placeholder="Введите логин" required />

        <label for="password">Пароль</label>
        <input type="password" id="password" placeholder="Введите пароль" required />

        <button type="submit">Войти</button>
        <p id="loginMessage" class="message"></p>
      </form>

      <div class="demo-data">
        <p><strong>Демо-доступ:</strong></p>
        <p>Логин: <code>admin</code></p>
        <p>Пароль: <code>12345</code></p>
      </div>
    </div>
  </div>

  <script src="diplim.js"></script>
</body>
</html>
